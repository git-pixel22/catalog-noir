services:
  - type: web
    name: catalog-noir
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENMETADATA_BASE_URL
        value: https://sandbox.open-metadata.org
      - key: OPENMETADATA_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
